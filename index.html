<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --cat-accent: #a855f7;
            --cat-eyes: #06b6d4;
            --base-font-size: 14px; /* Базовый размер шрифта */
        }

        body {
            font-family: 'VT323', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            user-select: none;
        }
        
        body.has-bg { background-color: #0d0d12 !important; }

        .cyber-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px var(--cat-eyes); }

        .stat-bar-container { width: 80px; height: 6px; background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 2px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--cat-accent); width: 100%; transition: width 0.5s; }
        .fill-good { background-color: #22c55e; } 
        .fill-warn { background-color: #eab308; } 
        .fill-bad { background-color: #ef4444; }

        /* --- CAT CONTAINER & ANIMATIONS --- */
        #cyber-cat {
            filter: drop-shadow(0 4px 0px rgba(0,0,0,0.5));
            image-rendering: pixelated; 
            cursor: grab;
            position: absolute;
            transition: left 2s linear, top 2s linear, width 0.3s, height 0.3s; /* Добавлена анимация изменения размера */
            -webkit-app-region: no-drag; 
            z-index: 20;
            /* Размеры задаются через JS */
            width: 128px; 
            height: 128px;
        }
        
        #cyber-cat.no-transition { transition: none !important; }
        
        #cyber-cat.dragging {
            cursor: grabbing; transform: scale(1.1); transition: none !important; z-index: 50;
        }

        #laser-dot {
            position: absolute; width: 10px; height: 10px; background-color: #ff0000; border-radius: 50%;
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; pointer-events: none; z-index: 100; display: none;
            transition: none; 
        }

        /* Basic States */
        .cat-idle-img { animation: idle-bounce 1s infinite steps(2); }
        .cat-walking-img { animation: walk-bob 0.2s infinite steps(2); }
        .cat-chasing-img { animation: walk-bob 0.1s infinite steps(2); }

        /* Action Animations */
        .anim-eating { animation: eat-shake 0.2s infinite; }
        .anim-petting { animation: pet-squish 0.4s infinite alternate; }
        .anim-playing { animation: play-jump 0.5s ease-in-out; }
        /* Сон теперь просто затемнение, картинка меняется скриптом */
        .anim-sleeping { opacity: 0.9; transform: translateY(5px); }

        @keyframes idle-bounce { 0% { transform: translateY(0); } 100% { transform: translateY(2px); } }
        @keyframes walk-bob { 0% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        
        @keyframes eat-shake { 0% { transform: rotate(0deg) translateY(2px); } 25% { transform: rotate(-3deg) translateY(4px); } 75% { transform: rotate(3deg) translateY(4px); } 100% { transform: rotate(0deg) translateY(2px); } }
        @keyframes pet-squish { 0% { transform: scaleY(1); } 100% { transform: scaleY(0.85) translateY(5px); } }
        @keyframes play-jump { 0% { transform: translateY(0); } 50% { transform: translateY(-30px) scale(1.1); } 100% { transform: translateY(0); } }

        /* --- UI ELEMENTS --- */
        .chat-bubble { opacity: 0; transition: opacity 0.2s; transform: translateY(10px); pointer-events: none; }
        .chat-bubble.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        .pixel-box { 
            background: rgba(17, 24, 39, 0.95); 
            border: 2px solid var(--cat-accent); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
            border-radius: 4px;
            backdrop-filter: blur(4px); 
        }

        .close-btn-mini {
            position: absolute; top: 2px; right: 2px;
            width: 16px; height: 16px;
            background: #ef4444; color: white;
            border-radius: 2px; font-size: 10px; line-height: 16px; text-align: center;
            cursor: pointer; opacity: 0.8; z-index: 50;
        }
        .close-btn-mini:hover { opacity: 1; }
        
        .dock-btn { 
            background: rgba(31, 41, 55, 0.8); 
            border: 1px solid #374151; 
            color: #9ca3af; 
            transition: all 0.2s;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
        }
        .dock-btn:hover { border-color: var(--cat-accent); color: white; background: rgba(31, 41, 55, 1); transform: translateY(-2px); }
        .dock-btn.active { border-color: #22c55e; color: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.3); }
        .dock-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

        .btn-pixel { background: rgba(31, 41, 55, 0.9); border: 1px solid #374151; color: #e5e7eb; transition: all 0.1s; cursor: pointer;}
        .btn-pixel:hover { border-color: var(--cat-accent); color: white; background: rgba(31, 41, 55, 1); }

        #stats-popup { opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.2s; }
        #stats-popup.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* Динамический размер шрифта */
        .dynamic-font { font-size: var(--base-font-size); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="laser-dot"></div>

    <!-- MAIN DOCK (Нижняя левая панель) -->
    <div id="ui-layer" class="absolute bottom-4 left-4 z-50 pointer-events-auto flex flex-col gap-2 items-start">
        
        <!-- Chat Logs Container -->
        <div id="chat-logs-container" class="hidden w-64 mb-1">
            <div class="pixel-box bg-gray-900/90 text-xs relative">
                <div class="close-btn-mini" onclick="toggleLogs()">x</div>
                <div class="flex justify-between items-center p-2 border-b border-gray-700">
                    <span class="font-bold text-fuchsia-400">ЖУРНАЛ</span>
                </div>
                <div id="log-content" class="h-32 overflow-y-auto p-2 space-y-1 font-mono text-gray-300 dynamic-font">
                    <div class="text-gray-500 italic">> Система готова...</div>
                </div>
            </div>
        </div>

        <!-- Stats Popup -->
        <div id="stats-popup" class="mb-1">
            <div class="pixel-box p-3 w-48 bg-gray-900/95 relative">
                <div class="close-btn-mini" onclick="toggleStats()">x</div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold cyber-text text-white">СОСТОЯНИЕ</span>
                    <span class="text-[10px] text-green-400">ONLINE</span>
                </div>
                <div class="space-y-2 text-[10px] text-gray-300">
                    <div class="flex items-center justify-between"><span>ГОЛОД</span><div class="stat-bar-container"><div id="bar-hunger" class="stat-bar-fill fill-good" style="width: 100%"></div></div></div>
                    <div class="flex items-center justify-between"><span>ЭНЕРГИЯ</span><div class="stat-bar-container"><div id="bar-energy" class="stat-bar-fill fill-good" style="width: 100%"></div></div></div>
                </div>
            </div>
        </div>

        <!-- THE DOCK -->
        <div class="flex gap-2 p-2 pixel-box bg-gray-900/80 backdrop-blur-sm rounded-lg">
            <button onclick="toggleStats()" id="btn-stats" class="dock-btn" title="Статус"><i data-lucide="activity" class="w-4 h-4"></i></button>
            <div class="w-px bg-gray-700 h-6 self-center mx-1"></div>
            <button onclick="toggleSound()" id="btn-sound" class="dock-btn active" title="Звук"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
            <button onclick="toggleLaser()" id="laser-btn" class="dock-btn" title="Лазер"><i data-lucide="crosshair" class="w-4 h-4 text-red-400"></i></button>
            <button onclick="toggleLogs()" id="btn-logs" class="dock-btn" title="Журнал"><i data-lucide="file-text" class="w-4 h-4"></i></button>
            <button onclick="toggleSettings()" class="dock-btn" title="Настройки"><i data-lucide="settings" class="w-4 h-4"></i></button>
            <div class="w-px bg-gray-700 h-6 self-center mx-1"></div>
            <button onclick="window.close()" class="dock-btn danger" title="Выход"><i data-lucide="power" class="w-4 h-4"></i></button>
        </div>
    </div>

    <input type="file" id="custom-skin-input" class="hidden" accept="image/*">
    <input type="file" id="custom-sleep-input" class="hidden" accept="image/*">
    <input type="file" id="custom-bg-input" class="hidden" accept="image/*">

    <!-- The CyberCat -->
    <div id="cyber-cat" class="absolute flex justify-center items-center" style="left: 50%; top: 50%;">
        
        <!-- Chat Bubble -->
        <div id="cat-chat" class="chat-bubble absolute bottom-full mb-2 w-64 p-1 z-30">
            <div class="pixel-box p-3 relative">
                <!-- Close Button for Chat -->
                <div class="close-btn-mini" onclick="hideChat()">x</div>
                
                <div id="chat-content" class="text-white mb-2 font-bold break-words pr-4 dynamic-font">Мур-мур!</div>
                <div id="action-buttons" class="grid grid-cols-2 gap-2 mb-2">
                    <button onclick="performAction('feed')" class="btn-pixel py-1 rounded text-xs text-yellow-300 hover:bg-yellow-900/50">🍗 Еда</button>
                    <button onclick="performAction('pet')" class="btn-pixel py-1 rounded text-xs text-pink-300 hover:bg-pink-900/50">💖 Гладить</button>
                    <button onclick="performAction('play')" class="btn-pixel py-1 rounded text-xs text-blue-300 hover:bg-blue-900/50">🧶 Играть</button>
                    <button onclick="performAction('sleep')" class="btn-pixel py-1 rounded text-xs text-indigo-300 hover:bg-indigo-900/50">💤 Спать</button>
                    <button onclick="toggleChatInput()" class="btn-pixel col-span-2 py-1 rounded text-xs text-white bg-gray-700">💬 Ответить</button>
                </div>
                <div id="user-input-area" class="hidden border-t border-gray-600 pt-2">
                    <input type="text" id="user-msg" class="w-full bg-black/50 border border-gray-600 px-2 py-1 text-white focus:border-white outline-none rounded font-mono dynamic-font" placeholder="Сообщение...">
                </div>
            </div>
        </div>

        <div id="visual-container" class="w-full h-full relative pointer-events-none">
            <img id="custom-cat-img" 
                 src="cat.png" 
                 class="w-full h-full object-contain absolute inset-0 cat-idle-img" 
                 style="image-rendering: pixelated;"
                 draggable="false"
                 onerror="this.src='cat.png'"
                 alt="Yuma">
        </div>
    </div>

    <!-- Full Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center">
        <div class="pixel-box p-6 w-96 bg-gray-900 pointer-events-auto relative max-h-[90vh] overflow-y-auto">
            <div class="close-btn-mini" style="top: 10px; right: 10px; width: 24px; height: 24px; font-size: 14px; line-height: 24px;" onclick="toggleSettings()">x</div>
            <h2 class="text-white font-bold mb-4 text-center border-b border-gray-700 pb-2">НАСТРОЙКИ</h2>
            
            <div class="space-y-4">
                <!-- AI Config -->
                <div class="border border-gray-700 p-2 rounded">
                    <h3 class="text-xs font-bold text-fuchsia-400 mb-2">МОЗГ (AI)</h3>
                    <div class="space-y-2">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">ПРОВАЙДЕР</label>
                            <select id="provider-select" onchange="updateProviderUI()" class="w-full bg-black border border-gray-600 p-1 text-white text-xs rounded">
                                <option value="openrouter">OpenRouter</option>
                                <option value="gemini">Google Gemini (Beta)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">API KEY</label>
                            <input type="password" id="api-key" class="w-full bg-black border border-gray-600 p-1 text-white text-xs rounded" placeholder="sk-...">
                        </div>
                        <div id="model-container">
                            <label class="block text-[10px] text-gray-400 mb-1">МОДЕЛЬ</label>
                            <input type="text" id="model-name" class="w-full bg-black border border-gray-600 p-1 text-white text-xs rounded" value="mistralai/mistral-7b-instruct:free">
                        </div>
                    </div>
                </div>

                <!-- Personality Config -->
                <div class="border border-gray-700 p-2 rounded">
                    <h3 class="text-xs font-bold text-green-400 mb-2">ЛИЧНОСТЬ</h3>
                    <div class="space-y-2">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">ВАШЕ ИМЯ</label>
                            <input type="text" id="user-name-input" class="w-full bg-black border border-gray-600 p-1 text-white text-xs rounded" placeholder="Хозяин">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">ХАРАКТЕР КОТА (ПРОМТ)</label>
                            <textarea id="cat-prompt-input" rows="3" class="w-full bg-black border border-gray-600 p-1 text-white text-xs rounded" placeholder="Ты милый кот по имени Yuma..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Appearance Config -->
                <div class="border border-gray-700 p-2 rounded">
                    <h3 class="text-xs font-bold text-blue-400 mb-2">ВНЕШНОСТЬ</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">СКОРОСТЬ ПЕРЕМЕЩЕНИЯ</label>
                            <input type="range" id="speed-input" min="0.5" max="5.0" step="0.5" value="2.0" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <!-- Размер кота -->
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">РАЗМЕР КОТА (x<span id="scale-val">1.0</span>)</label>
                            <input type="range" id="scale-input" min="0.5" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('scale-val').innerText = this.value" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <!-- Размер шрифта -->
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1">РАЗМЕР ШРИФТА (<span id="font-val">14</span>px)</label>
                            <input type="range" id="font-input" min="10" max="24" step="1" value="14" oninput="document.getElementById('font-val').innerText = this.value" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        </div>

                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="document.getElementById('custom-skin-input').click()" class="btn-pixel py-1 text-[10px]">Скин</button>
                            <button onclick="document.getElementById('custom-bg-input').click()" class="btn-pixel py-1 text-[10px]">Фон</button>
                            <button onclick="document.getElementById('custom-sleep-input').click()" class="btn-pixel py-1 text-[10px]">Сон</button>
                            <div class="hidden"></div> <!-- Пустой блок для выравнивания -->
                            
                            <button onclick="resetSkin()" class="btn-pixel py-1 text-[10px] text-red-400">Сброс Скина</button>
                            <button onclick="resetBackground()" class="btn-pixel py-1 text-[10px] text-red-400">Сброс Фона</button>
                            <button onclick="resetSleep()" class="btn-pixel py-1 text-[10px] text-red-400">Сброс Сна</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 mt-4">
                <button onclick="toggleSettings()" class="flex-1 btn-pixel py-2 text-gray-400 text-xs">Отмена</button>
                <button onclick="saveSettings()" class="flex-1 btn-pixel py-2 text-green-400 text-xs font-bold">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Config
        const config = { 
            moveInterval: 4500, 
            talkInterval: 45000, 
            apiKey: '', 
            provider: 'openrouter', 
            model: 'mistralai/mistral-7b-instruct:free', 
            moveSpeed: 2.0,
            userName: 'Хозяин',
            systemPrompt: 'Ты Yuma, виртуальный кот. Ты милый, немного саркастичный и любишь киберпанк. Отвечай кратко.',
            catScale: 1.0,
            fontSize: 14
        };

        const state = { 
            isMoving: false, 
            isChatting: false, 
            isSleeping: false, 
            isDragging: false, 
            isLaserOn: false, 
            isMuted: false, // Звук
            targetX: 0, targetY: 0, 
            laserX: 0, laserY: 0, 
            x: 50, y: 50, 
            hunger: 90, energy: 90 
        };
        const cat = document.getElementById('cyber-cat');
        const imgElement = document.getElementById('custom-cat-img');
        
        // Звуковая система (Web Audio API)
        let audioCtx;

        function initSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function play8BitSound(type) {
            if (state.isMuted) return;
            initSound();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'meow') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } 
            else if (type === 'purr') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(50, now);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
            else if (type === 'eat') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(500, now + 0.1);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
                setTimeout(() => {
                    const o2 = audioCtx.createOscillator();
                    const g2 = audioCtx.createGain();
                    o2.connect(g2); g2.connect(audioCtx.destination);
                    o2.type = 'square'; o2.frequency.setValueAtTime(200, now + 0.15);
                    g2.gain.setValueAtTime(0.05, now + 0.15); g2.gain.linearRampToValueAtTime(0, now + 0.2);
                    o2.start(now + 0.15); o2.stop(now + 0.2);
                }, 150);
            }
            else if (type === 'laser') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
            else if (type === 'notification') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        function toggleSound() {
            state.isMuted = !state.isMuted;
            const btn = document.getElementById('btn-sound');
            if (state.isMuted) {
                btn.classList.remove('active');
                btn.innerHTML = '<i data-lucide="volume-x" class="w-4 h-4"></i>';
            } else {
                btn.classList.add('active');
                btn.innerHTML = '<i data-lucide="volume-2" class="w-4 h-4"></i>';
                play8BitSound('notification'); 
            }
            lucide.createIcons();
            initSound();
        }

        function init() {
            // Load Settings
            if(localStorage.getItem('cybercat_key')) config.apiKey = localStorage.getItem('cybercat_key');
            if(localStorage.getItem('cybercat_provider')) config.provider = localStorage.getItem('cybercat_provider');
            if(localStorage.getItem('cybercat_model')) config.model = localStorage.getItem('cybercat_model');
            if(localStorage.getItem('cybercat_speed')) config.moveSpeed = parseFloat(localStorage.getItem('cybercat_speed'));
            if(localStorage.getItem('cybercat_skin')) applyCustomSkin(localStorage.getItem('cybercat_skin'));
            if(localStorage.getItem('cybercat_bg')) applyCustomBg(localStorage.getItem('cybercat_bg'));
            if(localStorage.getItem('cybercat_username')) config.userName = localStorage.getItem('cybercat_username');
            if(localStorage.getItem('cybercat_prompt')) config.systemPrompt = localStorage.getItem('cybercat_prompt');
            
            // Загрузка масштаба и шрифта
            if(localStorage.getItem('cybercat_scale')) config.catScale = parseFloat(localStorage.getItem('cybercat_scale'));
            if(localStorage.getItem('cybercat_font')) config.fontSize = parseInt(localStorage.getItem('cybercat_font'));

            // Set UI Values
            document.getElementById('provider-select').value = config.provider;
            document.getElementById('model-name').value = config.model;
            document.getElementById('api-key').value = config.apiKey;
            document.getElementById('speed-input').value = config.moveSpeed;
            document.getElementById('user-name-input').value = config.userName;
            document.getElementById('cat-prompt-input').value = config.systemPrompt;
            
            // Установка значений в UI
            document.getElementById('scale-input').value = config.catScale;
            document.getElementById('scale-val').innerText = config.catScale;
            document.getElementById('font-input').value = config.fontSize;
            document.getElementById('font-val').innerText = config.fontSize;

            // Применение настроек
            applyAppearance();
            updateProviderUI();

            setInterval(autonomousMove, config.moveInterval);
            setInterval(autonomousTalk, config.talkInterval);
            setInterval(decayStats, 60000); 

            cat.addEventListener('mousedown', startDrag); 
            window.addEventListener('mousemove', drag); 
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('mousemove', handleMouseMove);
            
            window.addEventListener('click', (e) => {
                initSound();
                if (state.isLaserOn && !e.target.closest('#laser-btn')) {
                    toggleLaser();
                }
            });

            document.getElementById('user-msg').addEventListener('keypress', (e) => { if (e.key === 'Enter') { handleUserResponse(e.target.value); e.target.value = ''; } });
            document.getElementById('custom-skin-input').addEventListener('change', handleSkinUpload);
            document.getElementById('custom-sleep-input').addEventListener('change', handleSleepUpload);
            document.getElementById('custom-bg-input').addEventListener('change', handleBgUpload);

            if (typeof require !== 'undefined') {
                const { ipcRenderer } = require('electron');
                let lastIgnore = null;
                function updateMouseIgnore(e) {
                    if (state.isLaserOn) {
                        if (lastIgnore !== false) {
                            ipcRenderer.send('set-ignore-mouse-events', false);
                            lastIgnore = false;
                        }
                        return;
                    }

                    const el = document.elementFromPoint(e.clientX, e.clientY);
                    const isInteractive = 
                        cat.contains(el) || 
                        document.getElementById('ui-layer').contains(el) ||
                        document.getElementById('cat-chat').contains(el) ||
                        document.getElementById('settings-modal').contains(el) ||
                        state.isDragging;

                    if (isInteractive) {
                        if (lastIgnore !== false) {
                            ipcRenderer.send('set-ignore-mouse-events', false);
                            lastIgnore = false;
                        }
                    } else {
                        if (lastIgnore !== true) {
                            ipcRenderer.send('set-ignore-mouse-events', true, { forward: true });
                            lastIgnore = true;
                        }
                    }
                }
                window.addEventListener('mousemove', updateMouseIgnore);
            }
            updateStatUI();
        }

        function applyAppearance() {
            // Применяем размер кота
            const baseSize = 128; // 32 tailwind units * 4
            const newSize = baseSize * config.catScale;
            cat.style.width = newSize + 'px';
            cat.style.height = newSize + 'px';

            // Применяем размер шрифта
            document.documentElement.style.setProperty('--base-font-size', config.fontSize + 'px');
        }

        // --- Dock UI Logic ---
        function toggleStats() {
            const popup = document.getElementById('stats-popup');
            const btn = document.getElementById('btn-stats');
            popup.classList.toggle('visible');
            popup.classList.contains('visible') ? btn.classList.add('active') : btn.classList.remove('active');
        }

        function toggleLogs() {
            const logs = document.getElementById('chat-logs-container');
            const btn = document.getElementById('btn-logs');
            logs.classList.toggle('hidden');
            !logs.classList.contains('hidden') ? btn.classList.add('active') : btn.classList.remove('active');
        }

        function addLog(sender, text) {
            const container = document.getElementById('log-content');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            entry.innerHTML = `<span class="text-gray-500">[${time}]</span> <span class="font-bold ${sender==='Yuma'?'text-fuchsia-400':'text-green-400'}">${sender}:</span> ${text}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // --- Files ---
        function handleBgUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => { applyCustomBg(ev.target.result); try { localStorage.setItem('cybercat_bg', ev.target.result); } catch(err) {} };
            reader.readAsDataURL(f); toggleSettings();
        }
        function applyCustomBg(src) { document.body.style.backgroundImage = `url('${src}')`; document.body.classList.add('has-bg'); }
        function resetBackground() { document.body.style.backgroundImage = 'none'; document.body.classList.remove('has-bg'); localStorage.removeItem('cybercat_bg'); toggleSettings(); }

        function handleSkinUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => { applyCustomSkin(ev.target.result); try { localStorage.setItem('cybercat_skin', ev.target.result); } catch(err) {} };
            reader.readAsDataURL(f); toggleSettings();
        }
        function applyCustomSkin(src) { 
            // Если кот не спит, меняем картинку. Если спит — запоминаем в localStorage, но не меняем пока спит
            if (!state.isSleeping) {
                document.getElementById('custom-cat-img').src = src; 
            }
        }
        function resetSkin() { localStorage.removeItem('cybercat_skin'); location.reload(); }

        // --- Sleep Customization ---
        function handleSleepUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => { 
                try { 
                    localStorage.setItem('cybercat_sleep', ev.target.result); 
                    // Если кот спит прямо сейчас, обновляем картинку
                    if(state.isSleeping) document.getElementById('custom-cat-img').src = ev.target.result;
                } catch(err) {} 
            };
            reader.readAsDataURL(f); toggleSettings();
        }
        function resetSleep() { 
            localStorage.removeItem('cybercat_sleep'); 
            if(state.isSleeping) document.getElementById('custom-cat-img').src = 'sleep.png';
            toggleSettings(); 
        }

        // --- Laser ---
        let chaseFrame;
        function toggleLaser() {
            state.isLaserOn = !state.isLaserOn;
            const btn = document.getElementById('laser-btn');
            const dot = document.getElementById('laser-dot');
            
            if (state.isLaserOn) {
                btn.classList.add('active'); 
                dot.style.display = 'block'; 
                state.isMoving = false;
                cat.classList.add('no-transition'); 
                play8BitSound('laser');
                chaseFrame = requestAnimationFrame(chaseLoop);
                addLog("System", "Laser ON (Click to stop)");
            } else {
                btn.classList.remove('active'); 
                dot.style.display = 'none';
                cat.classList.remove('no-transition'); 
                cancelAnimationFrame(chaseFrame);
                imgElement.classList.remove('cat-chasing-img');
                imgElement.classList.add('cat-idle-img');
            }
        }

        function handleMouseMove(e) {
            if (state.isLaserOn) {
                state.targetX = e.clientX;
                state.targetY = e.clientY;
                state.laserX = (e.clientX / window.innerWidth) * 100; 
                state.laserY = (e.clientY / window.innerHeight) * 100;
            }
        }

        function chaseLoop() {
            if (!state.isLaserOn) return;

            const dot = document.getElementById('laser-dot');
            dot.style.left = state.targetX + 'px';
            dot.style.top = state.targetY + 'px';

            const dx = state.laserX - state.x; 
            const dy = state.laserY - state.y; 
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 1) {
                const speed = 0.5 * (dist > 5 ? 1.5 : 1); 
                state.x += dx * 0.08 * speed; 
                state.y += dy * 0.08 * speed;
                
                const flip = dx < 0 ? -1 : 1; 
                document.getElementById('visual-container').style.transform = `scaleX(${flip})`;
                
                if(!imgElement.classList.contains('cat-chasing-img')) { 
                    imgElement.classList.remove('cat-idle-img', 'cat-walking-img', 'anim-sleeping'); 
                    imgElement.classList.add('cat-chasing-img'); 
                }
                updateCatPosition(state.x, state.y);
            } else {
                imgElement.classList.remove('cat-chasing-img'); 
                imgElement.classList.add('cat-idle-img');
            }
            chaseFrame = requestAnimationFrame(chaseLoop);
        }

        // --- Drag ---
        let dragOffsetX = 0, dragOffsetY = 0;
        function startDrag(e) {
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('close-btn-mini')) return;
            e.preventDefault(); state.isDragging = true; state.isMoving = false; cat.classList.add('dragging');
            constCX = e.clientX; const cy = e.clientY; const r = cat.getBoundingClientRect(); dragOffsetX = cx - (r.left + r.width/2); dragOffsetY = cy - (r.top + r.height/2);
            play8BitSound('meow'); 
            
            // Wake up if sleeping
            if(state.isSleeping) {
                wakeUp();
            }
        }
        function drag(e) {
            if (!state.isDragging) return; e.preventDefault();
            const cx = e.clientX; const cy = e.clientY;
            const xp = ((cx - dragOffsetX)/window.innerWidth)*100; const yp = ((cy - dragOffsetY)/window.innerHeight)*100;
            updateCatPosition(Math.max(0, Math.min(95, xp)), Math.max(0, Math.min(95, yp)));
        }
        function endDrag(e) { if (!state.isDragging) return; state.isDragging = false; cat.classList.remove('dragging'); interactWithCat(); }

        function autonomousMove() {
            if (state.isChatting || state.isSleeping || state.isDragging || Math.random() > 0.7 || state.isLaserOn) return;
            const nx = Math.floor(Math.random()*80)+10; const ny = Math.floor(Math.random()*80)+10;
            const flip = nx < state.x ? -1 : 1;
            document.getElementById('visual-container').style.transform = `scaleX(${flip})`;
            const chat = document.getElementById('cat-chat'); 
            
            state.isMoving = true;
            imgElement.classList.remove('cat-idle-img'); imgElement.classList.add('cat-walking-img');
            cat.classList.remove('no-transition');
            cat.style.transition = `left ${config.moveSpeed}s linear, top ${config.moveSpeed}s linear`;
            updateCatPosition(nx, ny);
            setTimeout(() => { state.isMoving = false; imgElement.classList.remove('cat-walking-img'); imgElement.classList.add('cat-idle-img'); }, config.moveSpeed*1000);
        }
        function updateCatPosition(x, y) { state.x=x; state.y=y; cat.style.left=`${x}%`; cat.style.top=`${y}%`; }

        // --- Interaction ---
        function interactWithCat() {
            if(state.isLaserOn) return;
            showChat();
        }
        
        function showChat() {
            const chat = document.getElementById('cat-chat'); 
            chat.classList.add('visible'); 
            state.isChatting = true;
            chat.style.left = '50%';
            chat.style.transform = 'translate(-50%, 0)';
        }

        function hideChat() {
            const chat = document.getElementById('cat-chat');
            chat.classList.remove('visible');
            state.isChatting = false;
             setTimeout(() => {
                document.getElementById('action-buttons').classList.remove('hidden');
                document.getElementById('user-input-area').classList.add('hidden');
            }, 300);
        }
        
        function toggleChatInput() {
             document.getElementById('action-buttons').classList.add('hidden');
             document.getElementById('user-input-area').classList.remove('hidden');
             document.getElementById('user-msg').focus();
        }

        async function handleUserResponse(txt) {
            document.getElementById('chat-content').innerHTML = `<span class="animate-pulse">Думаю...</span>`;
            addLog(config.userName || "Вы", txt);
            let r = ""; 
            if(config.apiKey) r = await callAI(txt, true); 
            else setTimeout(()=>finalizeReply("Нужен ключ API!"), 1000);
            if(r) { finalizeReply(r); addLog("Yuma", r); play8BitSound('notification'); }
        }

        function finalizeReply(t) {
            document.getElementById('chat-content').innerText = t;
            setTimeout(() => {
                 hideChat();
            }, 8000);
        }

        async function callAI(p, isReply) {
            const s = `${config.systemPrompt}. Пользователя зовут ${config.userName}. Говори на русском языке. Отвечай коротко (1-2 предложения).`;
            const m = p;
            if(config.provider === 'openrouter') {
                try {
                    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST', headers: { 'Authorization': `Bearer ${config.apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: config.model, messages: [{role: 'system', content: s}, {role: 'user', content: m}] })
                    });
                    const d = await res.json(); return d.choices?.[0]?.message?.content || "Ошибка API";
                } catch(e) { return "Ошибка сети"; }
            } else { return "Gemini пока в бета-тесте."; }
        }

        function triggerAnimation(animClass) {
            imgElement.classList.remove('cat-idle-img', 'anim-eating', 'anim-petting', 'anim-playing', 'anim-sleeping');
            void imgElement.offsetWidth; 
            imgElement.classList.add(animClass);
            
            if (animClass !== 'anim-sleeping') {
                setTimeout(() => {
                    imgElement.classList.remove(animClass);
                    if(!state.isSleeping) imgElement.classList.add('cat-idle-img');
                    else imgElement.classList.add('anim-sleeping');
                }, 2000); 
            }
        }

        function wakeUp() {
            state.isSleeping = false;
            imgElement.classList.remove('anim-sleeping');
            // Возвращаем нормальный скин
            const savedSkin = localStorage.getItem('cybercat_skin');
            imgElement.src = savedSkin ? savedSkin : 'cat.png';
            
            imgElement.classList.add('cat-idle-img');
        }

        function performAction(action) {
            const content = document.getElementById('chat-content');
            
            // Если любое действие кроме сна - будим
            if (action !== 'sleep' && state.isSleeping) {
                wakeUp();
            }

            if(action === 'feed') { 
                state.hunger = Math.min(100, state.hunger+30); 
                content.innerText = "Вкусно! 🍗"; 
                triggerAnimation('anim-eating');
                play8BitSound('eat');
            }
            if(action === 'pet') { 
                state.energy = Math.min(100, state.energy+5);
                content.innerText = "Муррр... 😻"; 
                triggerAnimation('anim-petting');
                play8BitSound('purr');
            }
            if(action === 'play') { 
                state.hunger = Math.max(0, state.hunger-10);
                content.innerText = "Тыгыдык! 🧶"; 
                triggerAnimation('anim-playing');
                play8BitSound('meow');
            }
            if(action === 'sleep') { 
                state.isSleeping = true; 
                content.innerText = "Zzz..."; 
                
                // Проверяем, есть ли пользовательский скин сна
                const customSleep = localStorage.getItem('cybercat_sleep');
                imgElement.src = customSleep ? customSleep : 'sleep.png';
                
                triggerAnimation('anim-sleeping');
            }

            updateStatUI(); 
        }

        function decayStats() { 
            if(!state.isSleeping) { state.hunger -= 2; state.energy -= 1; } 
            else { state.energy += 5; state.hunger -= 1; } 
            state.hunger = Math.max(0, state.hunger);
            state.energy = Math.min(100, Math.max(0, state.energy));
            updateStatUI(); 
        }
        
        function updateStatUI() { 
            const h = document.getElementById('bar-hunger');
            const e = document.getElementById('bar-energy');
            h.style.width = state.hunger+'%'; 
            e.style.width = state.energy+'%';
            h.className = 'stat-bar-fill ' + (state.hunger < 30 ? 'fill-bad' : (state.hunger < 60 ? 'fill-warn' : 'fill-good'));
            e.className = 'stat-bar-fill ' + (state.energy < 30 ? 'fill-bad' : 'fill-good');
        }
        
        async function autonomousTalk() {
            if (state.isSleeping || state.isLaserOn || state.isChatting) return;
            
            if (Math.random() > 0.7) {
                const useAI = config.apiKey && Math.random() > 0.3; 
                let msg = "";
                if (useAI) {
                     msg = await callAI(`Придумай короткую фразу (1 предложение) чтобы начать разговор с хозяином ${config.userName}. Можно попросить еды или поиграть.`, false);
                } else {
                    const phrases = [`Мяу?`, `${config.userName}, ты тут?`, `Мне скучно...`, `Поиграй со мной!`, `*смотрит на курсор*`];
                    msg = phrases[Math.floor(Math.random()*phrases.length)];
                }
                if (msg && msg.length > 1) {
                    document.getElementById('chat-content').innerText = msg;
                    play8BitSound('meow');
                    showChat();
                    addLog("Yuma (Auto)", msg);
                    setTimeout(() => {
                        if (state.isChatting && document.getElementById('user-input-area').classList.contains('hidden')) {
                            hideChat();
                        }
                    }, 6000);
                }
            }
        }

        function toggleSettings() { 
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden'); 
            if(!modal.classList.contains('hidden')) {
                updateProviderUI();
                document.getElementById('user-name-input').value = config.userName || '';
                document.getElementById('cat-prompt-input').value = config.systemPrompt || '';
                // Сброс значений слайдеров к текущим сохраненным
                document.getElementById('scale-input').value = config.catScale;
                document.getElementById('scale-val').innerText = config.catScale;
                document.getElementById('font-input').value = config.fontSize;
                document.getElementById('font-val').innerText = config.fontSize;
            }
        }

        function updateProviderUI() { const p = document.getElementById('provider-select').value; document.getElementById('model-container').style.display = (p === 'openrouter') ? 'block' : 'none'; }
        
        function saveSettings() { 
            config.apiKey = document.getElementById('api-key').value;
            config.provider = document.getElementById('provider-select').value;
            config.model = document.getElementById('model-name').value;
            config.moveSpeed = parseFloat(document.getElementById('speed-input').value);
            config.userName = document.getElementById('user-name-input').value;
            config.systemPrompt = document.getElementById('cat-prompt-input').value;
            config.catScale = parseFloat(document.getElementById('scale-input').value);
            config.fontSize = parseInt(document.getElementById('font-input').value);

            localStorage.setItem('cybercat_speed', config.moveSpeed);
            localStorage.setItem('cybercat_provider', config.provider);
            localStorage.setItem('cybercat_model', config.model);
            localStorage.setItem('cybercat_key', config.apiKey);
            localStorage.setItem('cybercat_username', config.userName);
            localStorage.setItem('cybercat_prompt', config.systemPrompt);
            localStorage.setItem('cybercat_scale', config.catScale);
            localStorage.setItem('cybercat_font', config.fontSize);
            
            applyAppearance();
            toggleSettings();
            addLog("System", "Настройки сохранены");
        }

        window.onload = init;
    </script>
</body>
</html>
